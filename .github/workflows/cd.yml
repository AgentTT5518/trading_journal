name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'   # replace with pnpm or bun if needed

      - name: Install dependencies
        run: npm install   # replace with your package manager

      - name: Build
        run: npm run build
